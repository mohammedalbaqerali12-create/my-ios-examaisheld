name: Build iOS IPA (Cloud Mac)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make Gradle Wrapper Executable
      run: chmod +x ./gradlew

    - name: Build KMP Shared Framework (iOS ARM64)
      run: ./gradlew :shared:linkDebugFrameworkIosArm64 > action_build_log.txt 2>&1 || true

    - name: Exfiltrate Error Log
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add action_build_log.txt
        git commit -m "Exfiltrate Mac Build Log" || true
        git push origin main || true

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project for iosApp
      working-directory: ./iosApp
      run: xcodegen generate

    - name: Build iOS App Payload
      working-directory: ./iosApp
      run: |
        xcodebuild -project EXAMSHIELDAI_iOS.xcodeproj \
        -scheme iosApp \
        -configuration Debug \
        -sdk iphoneos \
        -arch arm64 \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO \
        build

    - name: Package into IPA
      working-directory: ./iosApp
      run: |
        mkdir -p Payload
        cp -r build/Debug-iphoneos/iosApp.app Payload/
        zip -r examshield_ios_app.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EXAMSHIELD_iOS
        path: iosApp/examshield_ios_app.ipa
